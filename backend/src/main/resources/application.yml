server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  graphql:
    graphiql:
      enabled: true

app:
  jwt:
    # IMPORTANT: Replace with a secure 256-bit base64 key in production
    # Generate with: openssl rand -base64 64
    secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    expiration: 900000 # 15 minutes (milliseconds)
    refresh-expiration: 604800000 # 7 days (milliseconds)
  oauth2:
    google:
      client-id: 795405589157-e4stn4094as6fu188f4dghdjrs5tvt5b.apps.googleusercontent.com
    facebook:
      app-id: 1304839274523712
      app-secret: 12f97ce9a4821ce32c03c2a0e3d07d37

logging:
  level:
    com.authbackend: DEBUG
    org.springframework.security: INFO
